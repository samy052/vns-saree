<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banarasi Kala | Pure Silk Heritage</title>

    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #1D1F20;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader {
        animation: rotate 1s infinite;
        height: 50px;
        width: 50px;
      }
      .loader:before,
      .loader:after {
        border-radius: 50%;
        content: '';
        display: block;
        height: 20px;
        width: 20px;
      }
      .loader:before {
        animation: ball1 1s infinite;
        background-color: #cb2025;
        box-shadow: 30px 0 0 #f8b334;
        margin-bottom: 10px;
      }
      .loader:after {
        animation: ball2 1s infinite;
        background-color: #00a096;
        box-shadow: 30px 0 0 #97bf0d;
      }
      @keyframes rotate {
        0% { transform: rotate(0deg) scale(0.8); }
        50% { transform: rotate(360deg) scale(1.2); }
        100% { transform: rotate(720deg) scale(0.8); }
      }
      @keyframes ball1 {
        0% { box-shadow: 30px 0 0 #f8b334; }
        50% { box-shadow: 0 0 0 #f8b334; margin-bottom: 0; transform: translate(15px,15px); }
        100% { box-shadow: 30px 0 0 #f8b334; margin-bottom: 10px; }
      }
      @keyframes ball2 {
        0% { box-shadow: 30px 0 0 #97bf0d; }
        50% { box-shadow: 0 0 0 #97bf0d; margin-top: -20px; transform: translate(15px,15px); }
        100% { box-shadow: 30px 0 0 #97bf0d; margin-top: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
